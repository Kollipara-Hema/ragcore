services:
  - type: web
    name: ragcore-api
    runtime: docker
    plan: starter
    region: ohio
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.1-70b-versatile
      - key: EMBEDDING_PROVIDER
        value: bge
      - key: VECTOR_STORE_PROVIDER
        value: faiss
      - key: ENVIRONMENT
        value: production
      - key: ENABLE_RERANKING
        value: "true"
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
