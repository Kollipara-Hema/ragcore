services:
  # ── RAG API ──────────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - VECTOR_STORE_PROVIDER=faiss
      - FAISS_DATA_DIR=/var/data/faiss
      - REDIS_URL=redis://:${REDIS_PASSWORD:-CHANGE_ME_IN_PROD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-CHANGE_ME_IN_PROD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-CHANGE_ME_IN_PROD}@redis:6379/2
      # Redirect Python's tempfile to the shared uploads volume so that paths
      # created by the API are reachable by the worker container.  Workaround
      # for api↔worker /tmp coupling; proper fix is to pass file bytes through
      # the broker instead of a filesystem path — deferred as future work.
      - TMPDIR=/var/data/uploads
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/var/data/uploads
      - faiss_data:/var/data/faiss
    restart: unless-stopped

  # ── Celery worker (async ingestion) ──────────────────────────────────────
  worker:
    build: .
    command: >
      celery -A ingestion.pipeline:celery_app worker
      --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - VECTOR_STORE_PROVIDER=faiss
      - FAISS_DATA_DIR=/var/data/faiss
      - REDIS_URL=redis://:${REDIS_PASSWORD:-CHANGE_ME_IN_PROD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-CHANGE_ME_IN_PROD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-CHANGE_ME_IN_PROD}@redis:6379/2
      - TMPDIR=/var/data/uploads
    depends_on:
      redis:
        condition: service_healthy
    # Worker shares the FAISS persistent volume with the api service so that
    # chunks written by ingest_file_task are persisted to the same disk layer
    # that the api process reads from on restart.  Two processes writing to the
    # same FAISS pickle is acceptable for this project's usage pattern (rare
    # async ingest writes, dominant sync reads) but is NOT safe for concurrent
    # multi-process ingest — that would require a write-lock or coordinator.
    volumes:
      - uploads_data:/var/data/uploads
      - faiss_data:/var/data/faiss
    restart: unless-stopped

  # ── Redis (cache + Celery broker) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-CHANGE_ME_IN_PROD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-CHANGE_ME_IN_PROD}
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    ports:
      - "9090:9090"
    depends_on:
      - api
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-CHANGE_ME_IN_PROD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  faiss_data:
  redis_data:
  prometheus_data:
  grafana_data:
  uploads_data:
