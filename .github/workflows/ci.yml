name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install linter
      run: |
        python -m pip install --upgrade pip
        pip install ruff==0.3.0
    - name: Lint with ruff
      run: ruff check . --ignore=E501,F401,F841

  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest==8.0.2 pytest-cov==7.1.0 pydantic==2.6.3 pydantic-settings==2.2.1 pandas==2.2.1 rank-bm25==0.2.2 sentence-transformers==2.6.1 faiss-cpu==1.8.0 langgraph==0.0.40 typing_extensions
    - name: Run basic import test
      run: python -c "from utils.models import Document; print('Import successful')"
    - name: Run unit tests with coverage
      continue-on-error: true
      run: pytest tests/unit/ -v --tb=short --cov=. --cov-report=xml:coverage.xml --cov-omit='tests/*'
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: coverage.xml
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker image
      continue-on-error: true
      run: docker build . --file Dockerfile --tag ragcore:test