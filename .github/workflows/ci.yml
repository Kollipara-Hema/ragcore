name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install linter
      run: |
        python -m pip install --upgrade pip
        pip install ruff==0.3.0
    - name: Lint with ruff
      run: ruff check . --ignore=E501,F401,F841

  unit-tests:
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - name: Run basic import test
      run: python -c "from utils.models import Document; print('Import successful')"

    - name: Run unit tests with coverage
      run: python -m pytest tests/unit/ -v --tb=short --cov=. --cov-report=xml:coverage.xml

    - name: Verify coverage file exists
      run: |
        pwd
        ls -la
        test -f coverage.xml && echo "coverage.xml found"

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker image
      continue-on-error: true
      run: docker build . --file Dockerfile --tag ragcore:test
